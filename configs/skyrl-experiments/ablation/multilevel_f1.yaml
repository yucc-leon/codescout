# Ablation V2: Multilevel F1 (beta=1.0)
# 对比 beta=0.5 vs beta=1.0
name: "v2_multilevel_f1"
description: "Multilevel F1 (beta=1.0) + format_reward, fixed prompt"

reward:
  - fn: multilevel_localization_f1_reward
    weight: 1.0
    args:
      beta: 1.0
  - fn: format_reward
    weight: 1.0
    args:
      penalize: false

tools:
  - terminal
  - localization_finish

prompts:
  system_prompt: "templates/system_prompt_tool_only.j2"
  user_prompt: "templates/file_module.j2"
