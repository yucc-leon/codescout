# Ablation V2: Hierarchical (soft gating)
# 对比 multilevel vs hierarchical
name: "v2_hierarchical_soft"
description: "Hierarchical (soft gating) + format_reward, fixed prompt"

reward:
  - fn: hierarchical_localization_reward
    weight: 1.0
    args:
      config_name: "general"
      tool_call_bonus: 0.1
  - fn: format_reward
    weight: 1.0
    args:
      penalize: false

tools:
  - terminal
  - localization_finish

prompts:
  system_prompt: "templates/system_prompt_tool_only.j2"
  user_prompt: "templates/file_module.j2"
