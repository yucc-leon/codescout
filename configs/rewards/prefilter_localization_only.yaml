# Prefilter config: only localization reward, no multiturn penalty.
# Used for curriculum learning difficulty scoring — we want pure localization
# ability as the difficulty signal, not turn efficiency.
name: "prefilter_localization_only"
description: "Localization F1 only, for curriculum difficulty scoring"

reward:
  - fn: multilevel_localization_f1_reward
    weight: 1.0

tools:
  - terminal

prompts:
  system_prompt: "templates/system_prompt_custom_finish.j2"
  user_prompt: "templates/file_module_custom_finish.j2"
